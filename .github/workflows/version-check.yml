name: Weekly upstream version check

on:
  schedule:
    # Mondays at 14:00 UTC (Tuesday 22:00 Asia/Taipei)
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Get latest OpenSpec CLI version
        id: openspec
        run: |
          version=$(npm view @fission-ai/openspec version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Latest OpenSpec CLI: $version"

      - name: Get latest Superpowers release
        id: superpowers
        run: |
          response=$(curl -fsSL https://api.github.com/repos/obra/superpowers/releases/latest)
          tag=$(echo "$response" | jq -r '.tag_name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Latest Superpowers: $tag"

      - name: Read pinned versions from README
        id: pinned
        run: |
          line=$(grep -E '^\| v1 \| `' superpowers-bridge/README.md | head -1)
          if [ -z "$line" ]; then
            echo "::error::Could not find Compatibility table row in superpowers-bridge/README.md"
            exit 1
          fi
          pinned_openspec=$(echo "$line" | awk -F'`' '{print $2}')
          pinned_superpowers=$(echo "$line" | awk -F'`' '{print $4}')
          echo "openspec=$pinned_openspec" >> "$GITHUB_OUTPUT"
          echo "superpowers=$pinned_superpowers" >> "$GITHUB_OUTPUT"
          echo "Pinned in README: OpenSpec=$pinned_openspec, Superpowers=$pinned_superpowers"

      - name: Install OpenSpec CLI (latest)
        run: npm install -g @fission-ai/openspec@${{ steps.openspec.outputs.version }}

      - name: Validate schema against latest OpenSpec
        id: validate
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-project/openspec/schemas
          cp -R superpowers-bridge /tmp/test-project/openspec/schemas/
          cd /tmp/test-project
          openspec schema validate superpowers-bridge

      - name: Ensure drift label exists
        # Always run so the label exists from day 1, even before the first drift fires.
        # The Upstream Drift badge in README queries for issues with this label and would
        # otherwise show an error / undefined state when the label doesn't yet exist.
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-version-check',
                color: 'fbca04',
                description: 'Drift detected by weekly version-check workflow',
              });
              core.info('Label upstream-version-check created');
            } catch (e) {
              if (e.status === 422) {
                core.info('Label upstream-version-check already exists');
              } else {
                throw e;
              }
            }

      - name: Open or update drift issue
        if: steps.openspec.outputs.version != steps.pinned.outputs.openspec || steps.superpowers.outputs.tag != steps.pinned.outputs.superpowers || steps.validate.outcome == 'failure'
        uses: actions/github-script@v9
        env:
          OPENSPEC_LATEST: ${{ steps.openspec.outputs.version }}
          OPENSPEC_PINNED: ${{ steps.pinned.outputs.openspec }}
          SUPERPOWERS_LATEST: ${{ steps.superpowers.outputs.tag }}
          SUPERPOWERS_PINNED: ${{ steps.pinned.outputs.superpowers }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const openspecLatest = process.env.OPENSPEC_LATEST;
            const openspecPinned = process.env.OPENSPEC_PINNED;
            const superpowersLatest = process.env.SUPERPOWERS_LATEST;
            const superpowersPinned = process.env.SUPERPOWERS_PINNED;
            const validateBroken = process.env.VALIDATE_OUTCOME === 'failure';
            const runUrl = process.env.RUN_URL;

            const openspecDrift = openspecPinned !== openspecLatest;
            const superpowersDrift = superpowersPinned !== superpowersLatest;

            const title = '[upstream-version-check] Drift detected';
            const body = [
              '> Auto-generated by `.github/workflows/version-check.yml` (weekly cron).',
              '',
              '## Detected versions',
              '',
              '| Component | Pinned in README | Latest upstream | Drift? |',
              '|---|---|---|---|',
              `| OpenSpec CLI | \`${openspecPinned}\` | \`${openspecLatest}\` | ${openspecDrift ? '**Yes**' : 'No'} |`,
              `| Superpowers | \`${superpowersPinned}\` | \`${superpowersLatest}\` | ${superpowersDrift ? '**Yes**' : 'No'} |`,
              '',
              `## Schema validation against \`${openspecLatest}\``,
              '',
              validateBroken
                ? '❌ **`openspec schema validate superpowers-bridge` FAILED.** Structural breakage — investigate immediately.'
                : '✅ `openspec schema validate superpowers-bridge` passed.',
              '',
              '## Action required',
              '',
              '- [ ] Review Superpowers release notes for behavioral changes (skill renames, PRECHECK semantics, transitive deps): https://github.com/obra/superpowers/releases',
              '- [ ] Review OpenSpec changelog: https://github.com/Fission-AI/OpenSpec/releases',
              '- [ ] If safe, bump the Compatibility table in `superpowers-bridge/README.md` and `superpowers-bridge/README.zh-TW.md` (set `Last verified` to today).',
              '- [ ] If breaking, add an entry under "Known breaking changes" in both READMEs.',
              '',
              `_Workflow run: ${runUrl}_`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-version-check',
              per_page: 10,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-version-check'],
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Fail run on schema breakage
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Schema validation failed against latest OpenSpec ${{ steps.openspec.outputs.version }}"
          exit 1
